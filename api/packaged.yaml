AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SpriteForge API — headless sprite generation service
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs22.x
    Architectures:
    - x86_64
Parameters:
  StageName:
    Type: String
    Default: prod
  ThrottleRateLimit:
    Type: Number
    Default: 10
    Description: Max requests per second
  ThrottleBurstLimit:
    Type: Number
    Default: 20
    Description: Max concurrent requests
Resources:
  SpriteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: spriteforge-sprites-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
        - Id: AutoDeleteSprites
          Status: Enabled
          ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  SpriteForgeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName:
        Ref: StageName
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowMethods:
        - POST
        - GET
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - x-api-key
      DefaultRouteSettings:
        ThrottlingRateLimit:
          Ref: ThrottleRateLimit
        ThrottlingBurstLimit:
          Ref: ThrottleBurstLimit
  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: 
        s3://aws-sam-cli-managed-default-samclisourcebucket-yieupocc9n4d/7440e151436ec27f4b9671dcd23ae9e2
      Environment:
        Variables:
          SPRITE_BUCKET:
            Ref: SpriteBucket
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: SpriteBucket
      Events:
        GenerateSprite:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /generate
            Method: POST
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /health
            Method: GET
        SwaggerDocs:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /docs
            Method: GET
        OpenApiSpec:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /openapi.yaml
            Method: GET
        DrawSprite:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /draw
            Method: POST
        ImportSprite:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /import
            Method: POST
        ExportSprite:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /export
            Method: POST
        ManageLayers:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /layers
            Method: POST
        ManageFrames:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /frames
            Method: POST
        ResizeCanvas:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /resize
            Method: POST
        GenerateBackground:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: SpriteForgeApi
            Path: /generate-background
            Method: POST
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: 
        https://${SpriteForgeApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  SpriteBucketName:
    Description: S3 bucket for generated sprites
    Value:
      Ref: SpriteBucket
